services:
  db:
    image: postgres:16-alpine
    container_name: sentinelpress-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinel}
      POSTGRES_DB: ${POSTGRES_DB:-sentinelpress}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - sentinel_pg_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentinel}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Mock listener service is added in Week 1, Day 3-4 once it exists.
  # mock-listener:
  #   build: ./sandbox
  #   container_name: sentinelpress-mock-listener
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   ports:
  #     - "8080:8080"
  #   networks:
  #     - sandbox-net

volumes:
  sentinel_pg_data:

networks:
  default:
    name: sentinelpress-net
